experiment:
  name: xgboost_exp
  run_name: baseline

xgboost:
  objective: multi:softprob
  num_class: 3
  random_state: 42

  max_depth: 7
  learning_rate: 0.1
  n_estimators: 100

  subsample: 0.8
  colsample_bytree: 0.5

  min_child_weight: 1
  gamma: 0

  reg_alpha: 0
  reg_lambda: 1

  eval_metric: mlogloss